# SwiftLint configuration — generated by build-macos-app skill
# Tuned to realm/SwiftLint's own dogfooded values + 2026 opt-in additions.

excluded:
  - .build
  - .spm-cache
  - Packages
  - DerivedData
  - "*.xcodeproj"
  - vendor

opt_in_rules:
  # SwiftUI / UIKit
  - private_swiftui_state
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - prefer_asset_symbols
  # Concurrency
  - incompatible_concurrency_annotation
  - redundant_sendable
  - unhandled_throwing_task
  - async_without_await
  - weak_delegate
  # Performance
  - first_where
  - last_where
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - sorted_first_last
  - empty_count
  - empty_string
  - reduce_into
  - flatmap_over_map_reduce
  # Code quality
  - toggle_bool
  - shorthand_optional_binding
  - discouraged_optional_boolean
  - modifier_order
  - implicit_return
  - prefer_self_in_static_references
  - direct_return
  - superfluous_else
  - prefer_condition_list
  - unneeded_throws_rethrows
  - redundant_nil_coalescing
  - identical_operands
  - convenience_type
  - fatal_error_message
  - period_spacing
  - closure_body_length

disabled_rules:
  - trailing_whitespace
  - trailing_comma                       # SwiftFormat owns this
  - opening_brace                        # SwiftFormat owns this
  - statement_position                   # SwiftFormat owns this
  - vertical_parameter_alignment_on_call # SwiftFormat owns this
  - todo
  - blanket_disable_command

line_length:
  warning: 140
  error: 250
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 800
  error: 1500

type_body_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 100
  error: 250

closure_body_length:
  warning: 80
  error: 300

cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

function_parameter_count:
  warning: 5
  error: 8

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level: 3
  function_level: 10

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
  excluded:
    - id
    - to
    - in
    - ok
    - x
    - y
    - z
    - i
    - j

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50
    error: 60
  excluded:
    - T

custom_rules:
  no_print_statements:
    name: "No print()"
    regex: '^\s*print\s*\('
    message: "Use Logger / OSLog instead of print() in production code."
    severity: warning

  swiftui_state_must_be_private:
    name: "Private @State"
    regex: '^\s*@State\s+(?!private)'
    message: "@State properties must be private (SwiftUI sample-code convention)."
    severity: warning

  no_force_try:
    name: "No try!"
    regex: '\btry!'
    message: "Avoid try!; handle the error or use try? with a fallback."
    severity: warning

  fatal_error_attribution:
    name: "fatalError() needs context"
    regex: 'fatalError\(\s*\)'
    message: "fatalError must include a non-empty message for crash triage."
    severity: error

  unchecked_sendable_audit:
    name: "@unchecked Sendable audit"
    regex: '@unchecked\s+Sendable'
    message: "Document why @unchecked Sendable is safe in a comment, or use a true Sendable type."
    severity: warning
