name: Swift Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Pin Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
      - name: SwiftFormat
        run: swiftformat --lint --reporter github-actions-log .

  typecheck:
    name: Typecheck — ${{ matrix.platform }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        platform: [macOS, iOS, tvOS, watchOS, visionOS]
    steps:
      - uses: actions/checkout@v4
      - name: Pin Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app
      - name: Download visionOS platform
        if: matrix.platform == 'visionOS'
        run: sudo xcodebuild -downloadPlatform visionOS
      - name: Typecheck
        env:
          SWIFT_HOOK_PLATFORM: ${{ matrix.platform }}
        run: bash scripts/swift-typecheck.sh

  test:
    name: Snapshot + unit tests
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Pin Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-xcode-26-${{ hashFiles('**/Package.resolved', '**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26-
      - name: Run tests
        run: |
          xcodebuild test \
            -scheme AppName \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            -resultBundlePath TestResults.xcresult
      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: |
            **/__Snapshots__/**/failure_*.png
            **/__Snapshots__/**/failure_*.diff.png
            TestResults.xcresult
          if-no-files-found: ignore
          retention-days: 14
